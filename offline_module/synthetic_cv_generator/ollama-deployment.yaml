apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ollama

  template:
    metadata:
      labels:
        app: ollama

    spec:
      containers:
      - name: ollama
        image: ollama/ollama
        ports:
        - containerPort: 11434