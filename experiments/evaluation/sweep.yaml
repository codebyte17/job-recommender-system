method: bayes

metric:
  name: evaluation/ndcg
  goal: maximize

parameters:

  top_k:
    values: [5, 10, 20]

  cv_count:
    values: [20]

  hybrid:
    values: [true, false]

  cosine_weight:
    values: [0.4, 0.5, 0.6, 0.7]

  jaccard_weight:
    values: [0.2, 0.25, 0.3]

  overlap_weight:
    values: [0.05, 0.1, 0.15]