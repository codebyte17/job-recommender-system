global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # ─────────────────────────────
  # Prometheus itself
  # ─────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # ─────────────────────────────
  # Python application metrics
  # ─────────────────────────────
  - job_name: "fastapi-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  # ─────────────────────────────
  # Redis application metrics
  # ─────────────────────────────
  - job_name: redis

    static_configs:
      - targets:
          - redis-exporter:9121