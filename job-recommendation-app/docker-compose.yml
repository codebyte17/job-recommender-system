version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi_app:latest
    container_name: fastapi_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - app_network


  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: celery_worker:latest
    container_name: celery_worker
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network


  flower:
    build:
      context: .
      dockerfile: Dockerfile
    image: celery_flower:latest
    container_name: celery_flower
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network


  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network


  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - app_network


volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge